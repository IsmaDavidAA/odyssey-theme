name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: npm run build

      - name: Rewrite root-absolute links for project pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          USER_SITE="${GITHUB_REPOSITORY_OWNER}.github.io"
          if [ "$REPO_NAME" != "$USER_SITE" ]; then
            PREFIX="/$REPO_NAME"
            echo "Applying prefix: $PREFIX"
            find dist -type f -name "*.html" -print0 | xargs -0 sed -i "s|href=\"/|href=\"$PREFIX/|g; s|src=\"/|src=\"$PREFIX/|g"
            find dist -type f -name "*.css" -print0 | xargs -0 sed -i "s|url('/|url('$PREFIX/|g; s|url(\"/|url(\"$PREFIX/|g"
          else
            echo "User site repo detected, skipping prefix rewrite."
          fi

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
